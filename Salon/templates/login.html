<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .login-container{
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #c59d5f;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background: #a8844f;
        }

        .register-link{
            text-align: center;
            margin-top: 20px;
        }

        .errorlist{
            color: red;
            list-style: none;
            padding: 0;
        }

    </style>

</head>

<body>

<div class="login-container">

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        {% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

        {{ form.non_field_errors }}

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required
            >

            {{ form.username.errors }}

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                required
            >

            {{ form.password.errors }}

        </div>


        <button type="submit">
            Login
        </button>

    </form>

    <div class="register-link">

        <p>
            Don't have an account?

            <a href="{% url 'register' %}">
                Register
            </a>
        </p>

    </div>

</div>

</body>
</html>
