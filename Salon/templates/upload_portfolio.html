<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Portfolio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    body{
      background: #f8f5f2;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .upload-card{
      background: #fff;
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .upload-title{
      text-align: center;
      margin-bottom: 30px;
    }

    .upload-title h2{
      font-weight: 700;
      color: #222;
    }

    .upload-title p{
      color: #777;
      font-size: 15px;
    }

    .form-label{
      font-weight: 600;
      margin-bottom: 8px;
      color: #444;
    }

    .form-control{
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #ddd;
    }

    .form-control:focus{
      box-shadow: none;
      border-color: #c59d5f;
    }

    .upload-btn{
      width: 100%;
      background: #c59d5f;
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      transition: 0.3s;
    }

    .upload-btn:hover{
      background: #a8844f;
    }

    .upload-icon{
      font-size: 50px;
      color: #c59d5f;
      margin-bottom: 15px;
    }

  </style>

</head>

<body>

  <div class="upload-card">

    <div class="upload-title">
      <i class="bi bi-images upload-icon"></i>
      <h2>Upload Portfolio</h2>
      <p>Add your best salon work to your portfolio gallery</p>
    </div>

    <form method="POST"
          action="{% url 'upload_portfolio' %}"
          enctype="multipart/form-data">

      {% csrf_token %}

      <div class="mb-4">
        <label class="form-label">Portfolio Title</label>
        <input type="text"
               name="title"
               class="form-control"
               placeholder="e.g. Bridal Makeup">
      </div>

      <div class="mb-4">
        <label class="form-label">Category</label>
        <input type="text"
               name="category"
               class="form-control"
               placeholder="e.g. Braids, Nails, Makeup">
      </div>

      <div class="mb-4">
        <label class="form-label">Upload Image</label>
        <input type="file"
               name="image"
               class="form-control">
      </div>

      <button type="submit" class="upload-btn">
        <i class="bi bi-cloud-arrow-up"></i>
        Upload Portfolio
      </button><br><br> 
      

    </form>
   <button type="submit" class="upload-btn">
        <i class="bi bi-cloud-arrow-up"></i>
        Check Bookings
      </button>
  </div>

</body>
</html>
