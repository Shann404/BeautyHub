<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: #f8f5f2;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px 20px;
        }

        .search-container{
            max-width: 1100px;
            margin: auto;
        }

        .search-header{
            text-align: center;
            margin-bottom: 40px;
        }

        .search-header h2{
            font-weight: 700;
            color: #222;
            margin-bottom: 10px;
        }

        .search-header p{
            color: #777;
            font-size: 16px;
        }

        .results-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .salon-card{
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            transition: 0.3s;
        }

        .salon-card:hover{
            transform: translateY(-5px);
        }

        .salon-image{
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .salon-content{
            padding: 20px;
        }

        .salon-name{
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .salon-name a{
            text-decoration: none;
            color: #222;
        }

        .salon-name a:hover{
            color: #c59d5f;
        }

        .salon-location{
            color: #777;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .view-btn{
            display: inline-block;
            background: #c59d5f;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
        }

        .view-btn:hover{
            background: #a8844f;
            color: white;
        }

        .empty-state{
            text-align: center;
            margin-top: 80px;
        }

        .empty-state i{
            font-size: 70px;
            color: #c59d5f;
            margin-bottom: 20px;
        }

        .empty-state h3{
            font-weight: 700;
            color: #222;
        }

        .empty-state p{
            color: #777;
        }

    </style>

</head>

<body>

<div class="search-container">

    <div class="search-header">
        <h2>Search Results</h2>
        <p>Showing salons matching "<strong>{{ query }}</strong>"</p>
    </div>

    {% if results %}

        <div class="results-grid">

            {% for salon in results %}

                <div class="salon-card">

                    {% if salon.image %}
                        <img src="{{ salon.image.url }}"
                             class="salon-image"
                             alt="{{ salon.name }}">
                    {% endif %}

                    <div class="salon-content">

                        <h3 class="salon-name">
                            <a href="{% url 'salon_detail' salon.slug %}">
                                {{ salon.name }}
                            </a>
                        </h3>

                        <p class="salon-location">
                            <i class="bi bi-geo-alt-fill"></i>
                            {{ salon.location }}
                        </p>

                        <a href="{% url 'salon_detail' salon.slug %}"
                           class="view-btn">
                            View Salon
                        </a>

                    </div>

                </div>

            {% endfor %}

        </div>

    {% else %}

        <div class="empty-state">

            <i class="bi bi-search"></i>

            <h3>No Salons Found</h3>

            <p>
                We couldn't find any salons matching
                "<strong>{{ query }}</strong>"
            </p>

        </div>

    {% endif %}

</div>

</body>
</html>
