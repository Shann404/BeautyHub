<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .register-container{
            width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .checkbox-group{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input{
            width: auto;
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #c59d5f;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background: #a8844f;
        }

        .login-link{
            text-align: center;
            margin-top: 20px;
        }

        .errorlist{
            color: red;
            list-style: none;
            padding: 0;
            margin-top: 5px;
        }

    </style>

</head>

<body>

<div class="register-container">

    <h2>Create Account</h2>

    <form method="POST" action="">

        {% csrf_token %}

        {{ form.non_field_errors }}

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required
            >

            {{ form.username.errors }}

        </div>


        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                required
            >

            {{ form.password.errors }}

        </div>

        <div class="form-group">

            <label>Confirm Password</label>

            <input
                type="password"
                name="confirm_password"
                required
            >

            {{ form.confirm_password.errors }}

        </div>

        <div class="form-group checkbox-group">

            <input
                type="checkbox"
                name="is_business"
                id="is_business"
            >

            <label for="is_business">
                Register as Business Owner
            </label>

        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">

        <p>
            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>
        </p>

    </div>

</div>

</body>
</html>
