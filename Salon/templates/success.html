<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:linear-gradient(135deg, #000, #333);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .card{

            background:white;
            color:#222;
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:90%;
            max-width:450px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
            animation:fadeIn 0.6s ease-in-out;
        }

        .checkmark{

            width:80px;
            height:80px;
            background:#000;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0 auto 20px;
            color:white;
            font-size:40px;
            font-weight:bold;
        }

        h1{
            font-size:24px;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
            font-size:14px;
        }

        .btn{

            display:inline-block;
            padding:12px 25px;
            background:black;
            color:white;
            text-decoration:none;
            border-radius:12px;
            transition:0.3s;
            font-weight:500;
        }

        .btn:hover{
            opacity:0.85;
            transform:translateY(-2px);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

    <div class="card">

        <div class="checkmark">
            ✓
        </div>

        <h1>Booking Successful</h1>

        <p>
            Your appointment has been confirmed. We look forward to seeing you!
        </p>

        <a href="{% url 'booking_list' %}" class="btn">
            View My Bookings
        </a>

    </div>

</body>
</html>
